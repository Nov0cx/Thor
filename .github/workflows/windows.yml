name: Windows

on:
  push:
  pull_request:

# Cancel superseded runs on the same ref.
concurrency:
  group: windows-${{ github.ref }}
  cancel-in-progress: true

env:
  # Grammars that syntax/syntax.odin hard-imports; each must be installed before
  # the app will type-check/build (see vendor/README.md).
  TS_ODIN: https://github.com/tree-sitter-grammars/tree-sitter-odin
  TS_LUA: https://github.com/tree-sitter-grammars/tree-sitter-lua
  TS_C: https://github.com/tree-sitter/tree-sitter-c
  TS_CPP: https://github.com/tree-sitter/tree-sitter-cpp
  TS_GO: https://github.com/tree-sitter/tree-sitter-go
  TS_JS: https://github.com/tree-sitter/tree-sitter-javascript
  # typescript and tsx are two grammars in one repo, selected by subdirectory.
  TS_TS: https://github.com/tree-sitter/tree-sitter-typescript
  TS_JAI: https://github.com/constantitus/tree-sitter-jai
  TS_RUST: https://github.com/tree-sitter/tree-sitter-rust
  TS_PYTHON: https://github.com/tree-sitter/tree-sitter-python
  TS_RUBY: https://github.com/tree-sitter/tree-sitter-ruby
  TS_JAVA: https://github.com/tree-sitter/tree-sitter-java
  TS_KOTLIN: https://github.com/fwcd/tree-sitter-kotlin
  TS_ZIG: https://github.com/tree-sitter-grammars/tree-sitter-zig
  TS_CSHARP: https://github.com/tree-sitter/tree-sitter-c-sharp
  # php and ocaml keep their grammar in a subdirectory, selected with -path.
  TS_PHP: https://github.com/tree-sitter/tree-sitter-php
  TS_HASKELL: https://github.com/tree-sitter/tree-sitter-haskell
  TS_OCAML: https://github.com/tree-sitter/tree-sitter-ocaml
  HARFBUZZ_VERSION: 12.1.0

jobs:
  windows:
    name: Windows
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      # Puts cl/lib/link on PATH; required to build HarfBuzz, the tree-sitter
      # runtime/parsers, and to link Thor (vendor:harfbuzz + libtree-sitter).
      - uses: ilammy/msvc-dev-cmd@v1

      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - uses: laytan/setup-odin@v2
        with:
          release: latest
          token: ${{ secrets.GITHUB_TOKEN }}

      # HarfBuzz is a local static-lib artifact on Windows (gitignored inside the
      # submodule). Build it once with meson, using the /MT CRT so it links
      # against Odin's static CRT (vendor/README.md).
      - name: Build HarfBuzz (static, /MT)
        shell: pwsh
        run: |
          python -m pip install --upgrade pip meson ninja
          curl.exe -LO https://github.com/harfbuzz/harfbuzz/releases/download/$env:HARFBUZZ_VERSION/harfbuzz-$env:HARFBUZZ_VERSION.tar.xz
          python -c "import tarfile; tarfile.open('harfbuzz-$env:HARFBUZZ_VERSION.tar.xz').extractall(filter='data')"
          cd harfbuzz-$env:HARFBUZZ_VERSION
          meson setup build --buildtype=release -Db_vscrt=mt -Db_ndebug=true -Ddefault_library=static -Dtests=disabled -Ddocs=disabled -Dbenchmark=disabled -Dglib=disabled -Dgobject=disabled -Dcairo=disabled -Dicu=disabled -Dfreetype=disabled -Dchafa=disabled -Dutilities=disabled
          meson compile -C build
          New-Item -ItemType Directory -Force ..\vendor\odin-harfbuzz\libs | Out-Null
          Copy-Item build\src\libharfbuzz.a ..\vendor\odin-harfbuzz\libs\harfbuzz.lib -Force

      - name: Build tree-sitter runtime + parsers
        shell: pwsh
        working-directory: vendor/odin-tree-sitter
        run: |
          odin run build -- install
          odin run build -- install-parser $env:TS_ODIN -yes
          odin run build -- install-parser $env:TS_LUA -yes
          odin run build -- install-parser $env:TS_C -yes
          odin run build -- install-parser $env:TS_CPP -yes
          odin run build -- install-parser $env:TS_GO -yes
          odin run build -- install-parser $env:TS_JS -yes
          odin run build -- install-parser $env:TS_TS "-path=typescript" "-name=typescript" -yes
          odin run build -- install-parser $env:TS_TS "-path=tsx" "-name=tsx" -yes
          odin run build -- install-parser $env:TS_JAI -yes
          odin run build -- install-parser $env:TS_RUST -yes
          odin run build -- install-parser $env:TS_PYTHON -yes
          odin run build -- install-parser $env:TS_RUBY -yes
          odin run build -- install-parser $env:TS_JAVA -yes
          odin run build -- install-parser $env:TS_KOTLIN -yes
          odin run build -- install-parser $env:TS_ZIG -yes
          odin run build -- install-parser $env:TS_CSHARP "-name=c_sharp" -yes
          odin run build -- install-parser $env:TS_PHP "-path=php" "-name=php" -yes
          odin run build -- install-parser $env:TS_HASKELL -yes
          odin run build -- install-parser $env:TS_OCAML "-path=grammars/ocaml" "-name=ocaml" -yes

      - name: Build Thor
        shell: pwsh
        run: odin build . -debug
